spring:
  application:
    name: amrs-orchestrator

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

amrs:
  sidecar:
    base-url: ${SIDECAR_URL}
  ollama:
    base-url: ${OLLAMA_HOST}
    model: ${OLLAMA_MODEL}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics